# ╔═══════════════════════════════════════╗
# ║            mpv/input.conf             ║
# ╚═══════════════════════════════════════╝
# Vim-style + sensible defaults

# ── Playback ──────────────────────────────────────────────────────────────────
SPACE          cycle pause
p              cycle pause
q              quit
Q              quit-watch-later

# ── Seeking ───────────────────────────────────────────────────────────────────
h              seek -5
l              seek  5
H              seek -60
L              seek  60
j              seek -10
k              seek  10
LEFT           seek -5
RIGHT          seek  5
UP             seek  60
DOWN           seek -60
,              frame-back-step
.              frame-step
HOME           seek 0 absolute-percent
END            seek 100 absolute-percent

# ── Volume ────────────────────────────────────────────────────────────────────
m              cycle mute
=              add volume  5
-              add volume -5
+              add volume  5

# ── Speed ─────────────────────────────────────────────────────────────────────
[              add speed -0.25
]              add speed  0.25
\              set speed 1.0

# ── Subtitles ─────────────────────────────────────────────────────────────────
v              cycle sub-visibility
n              add sub-delay -0.1
N              add sub-delay  0.1
b              cycle sub
B              cycle sub down

# ── Audio tracks ──────────────────────────────────────────────────────────────
a              cycle audio

# ── Window ────────────────────────────────────────────────────────────────────
f              cycle fullscreen
T              cycle ontop
1              add contrast -1
2              add contrast  1
3              add brightness -1
4              add brightness  1

# ── Screenshot ────────────────────────────────────────────────────────────────
s              screenshot video
S              screenshot window
