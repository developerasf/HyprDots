# ╔═══════════════════════════════════════╗
# ║             mpv/mpv.conf              ║
# ╚═══════════════════════════════════════╝

# ── Hardware decoding (Intel VA-API) ──────────────────────────────────────────
hwdec            = vaapi
hwdec-codecs     = all
vo               = gpu
gpu-api          = wayland
gpu-context      = wayland

# ── Video quality ─────────────────────────────────────────────────────────────
scale            = ewa_lanczos
cscale           = ewa_lanczos
dscale           = mitchell
correct-downscaling = yes
sigmoid-upscaling   = yes
deband           = yes
deband-iterations = 2
deband-threshold  = 48
deband-range      = 16

# ── Audio ─────────────────────────────────────────────────────────────────────
ao               = pipewire
volume           = 100
volume-max       = 150
audio-normalize-downmix = yes

# ── Subtitles ─────────────────────────────────────────────────────────────────
sub-auto         = fuzzy
sub-font         = "JetBrainsMono Nerd Font"
sub-font-size    = 44
sub-color        = "#c0caf5"
sub-border-color = "#1a1b26"
sub-border-size  = 2.5
sub-shadow-offset = 1
sub-ass-override = force

# ── OSD / UI ──────────────────────────────────────────────────────────────────
osd-font         = "JetBrainsMono Nerd Font"
osd-font-size    = 32
osd-color        = "#c0caf5"
osd-border-color = "#1a1b26"
osd-border-size  = 1.5
osd-bar-h        = 2
osd-bar-align-y  = -1
osd-duration     = 1500

# ── Window ────────────────────────────────────────────────────────────────────
title            = ${media-title}
keep-open        = yes
autofit-larger   = 90%x90%
cursor-autohide  = 1000

# ── Screenshots ───────────────────────────────────────────────────────────────
screenshot-format        = png
screenshot-png-compression = 3
screenshot-directory     = ~/Pictures/Screenshots
screenshot-template      = mpv_%F_%P

# ── Behaviour ─────────────────────────────────────────────────────────────────
save-position-on-quit = yes
watch-later-directory = ~/.local/share/mpv/watch_later
resume-playback       = yes
