# ╔═══════════════════════════════════════╗
# ║              ly/config.ini            ║
# ║   Ly — minimal TUI display manager    ║
# ╚═══════════════════════════════════════╝
# Full config reference: /etc/ly/config.ini (installed default)
# This only overrides the values we care about.
# install.sh injects default_user automatically.

# Pre-fill username — filled by install.sh with your actual username
default_user =

# Pre-select Hyprland session on boot
default_session = hyprland

# Remember last session and user across reboots
save = true
save_file = /etc/ly/save

# Clock in top-right corner
clock = %H:%M

# Animation: none | matrix | doom
animation = doom

# TTY to run on — must match service: ly@tty2.service
tty = 2

# Wayland + X session paths
waylandsessions = /usr/share/wayland-sessions
xsessions        = /usr/share/xsessions
