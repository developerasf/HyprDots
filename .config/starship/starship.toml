# ╔═══════════════════════════════════════╗
# ║         starship/starship.toml        ║
# ║         Tokyo Night                   ║
# ╚═══════════════════════════════════════╝

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](bold #565f89) $os$username$hostname$directory$git_branch$git_status$git_state
[╰─](bold #565f89)$character"""

add_newline = true
command_timeout = 1000

[os]
disabled = false
style = "bold #7aa2f7"

[os.symbols]
Arch = "󰣇 "

[username]
show_always = false
style_user  = "bold #7aa2f7"
style_root  = "bold #f7768e"
format      = "[$user]($style) "

[hostname]
ssh_only   = true
style      = "bold #9ece6a"
format     = "[@$hostname]($style) "

[directory]
style            = "bold #7dcfff"
truncation_length = 4
truncate_to_repo = true
format           = "[$path]($style)[$read_only]($read_only_style) "
read_only        = " 󰌾"
read_only_style  = "#f7768e"

[git_branch]
symbol = " "
style  = "bold #bb9af7"
format = "[$symbol$branch]($style) "

[git_status]
style    = "bold #e0af68"
format   = "([$all_status$ahead_behind]($style) )"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged   = "[++${count}](bold #9ece6a)"
modified = "[!${count}](#e0af68)"
deleted  = "[-${count}](#f7768e)"
untracked = "[?${count}](#565f89)"

[git_state]
style  = "bold #f7768e"
format = "[$state( $progress_current/$progress_total)]($style) "

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #bb9af7)"

[nodejs]
symbol = " "
style  = "#9ece6a"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style  = "#e0af68"
format = "[$symbol($version)]($style) "

[rust]
symbol = " "
style  = "#ff9e64"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style  = "#7dcfff"
format = "[$symbol($version)]($style) "

[java]
symbol = " "
style  = "#f7768e"
format = "[$symbol($version)]($style) "

[docker_context]
symbol = " "
style  = "#7aa2f7"
format = "[$symbol$context]($style) "

[cmd_duration]
min_time = 2000
style    = "#565f89"
format   = "[⏱ $duration]($style) "
