# ╔═══════════════════════════════════════╗
# ║            yazi/yazi.toml             ║
# ╚═══════════════════════════════════════╝

[manager]
ratio            = [1, 3, 4]   # parent:current:preview column ratio
sort_by          = "natural"
sort_sensitive   = false
sort_reverse     = false
sort_dir_first   = true
show_hidden      = false
show_symlink     = true
linemode         = "size"      # show file sizes in listing

[preview]
tab_size         = 2
max_width        = 1200
max_height       = 900
cache_dir        = ""
image_filter     = "triangle"
image_quality    = 82
sixel_fraction   = 15
ueberzug_scale   = 1
ueberzug_offset  = [0, 0, 0, 0]

[opener]
edit = [
    { run = 'nvim "$@"',  block = true,  desc = "Neovim",  for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open with default app" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$0")"', desc = "Reveal in file manager" },
]
extract = [
    { run = 'unar "$1"', desc = "Extract here" },
]
play = [
    { run = 'mpv "$@"',   orphan = true, desc = "mpv",    for = "unix" },
]
view_pdf = [
    { run = 'zathura "$@"', orphan = true, desc = "Zathura" },
]

[open]
rules = [
    # Editor
    { mime = "text/*",                         use = "edit"     },
    { mime = "application/json",               use = "edit"     },
    { mime = "application/javascript",         use = "edit"     },
    { mime = "application/x-shellscript",      use = "edit"     },
    # PDF
    { mime = "application/pdf",                use = "view_pdf" },
    # Media
    { mime = "video/*",                        use = "play"     },
    { mime = "audio/*",                        use = "play"     },
    # Images — use default viewer (imv)
    { mime = "image/*",                        use = "open"     },
    # Archives
    { mime = "application/zip",                use = "extract"  },
    { mime = "application/x-tar",              use = "extract"  },
    { mime = "application/x-bzip2",            use = "extract"  },
    { mime = "application/x-7z-compressed",    use = "extract"  },
    # Fallback
    { mime = "*",                              use = "open"     },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912    # 512MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
