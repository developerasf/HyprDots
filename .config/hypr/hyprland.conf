# ╔═══════════════════════════════════════╗
# ║         hyprland.conf                 ║
# ║   Hyprland 0.54 — wiki verified       ║
# ╚═══════════════════════════════════════╝

source = ~/.config/hypr/themes/colors.conf
source = ~/.config/hypr/conf/monitor.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/rules.conf

# ── Environment variables ──────────────────────────────────────────────────────
env = CLIPBOARD_EDITOR,nvim
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = LIBVA_DRIVER_NAME,iHD
env = GTK_THEME,Adwaita:dark

# ── General ────────────────────────────────────────────────────────────────────
general {
    gaps_in             = 2
    gaps_out            = 3
    border_size         = 2
    col.active_border   = $blue $magenta 45deg
    col.inactive_border = $bg3
    layout              = dwindle
    resize_on_border    = true
}

# ── Decoration ─────────────────────────────────────────────────────────────────
decoration {
    rounding         = 7
    active_opacity   = 1.0
    inactive_opacity = 0.92

    blur {
        enabled  = true
        size     = 6
        passes   = 3
        xray     = false
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(00000066)
    }
}

# ── Animations ─────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOut, 0.16, 1,    0.3,  1
    bezier = easeIn,  0.7,  0,    0.84, 0
    bezier = spring,  0.68, -0.6, 0.32, 1.6

    animation = windows,    1, 4, spring, popin 80%
    animation = windowsOut, 1, 3, easeIn, popin 80%
    animation = border,     1, 8, easeOut
    animation = fade,       1, 4, easeOut
    animation = workspaces, 1, 4, easeOut, slide
}

# ── Layouts ────────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = slave
}

# ── Misc ───────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    focus_on_activate        = true
}

xwayland {
  force_zero_scaling = true
}
# ── Gestures (0.54 new syntax — gestures block removed, use gesture keyword) ──
gesture = 3, horizontal, workspace
