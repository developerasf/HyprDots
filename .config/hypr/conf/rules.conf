# ── Float ──────────────────────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# ── Float + center ─────────────────────────────────────────────────
windowrule = float on, center on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# ── VirtualBox ─────────────────────────────────────────────────────
windowrule = float on, size 1100 700, center on, match:class ^(VirtualBox Manager)$

# ── Workspace assignments ──────────────────────────────────────────
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(code-oss)$
windowrule = workspace 3, match:class ^(Code)$
windowrule = workspace 4, match:class ^(thunar)$
windowrule = workspace 4, match:class ^(org.pwmt.zathura)$
windowrule = workspace 5, match:class ^(VirtualBox Machine)$
windowrule = workspace 5, match:class ^(VirtualBox Manager)$

# ── Opacity ────────────────────────────────────────────────────────
windowrule = opacity 0.95 0.90, match:class ^(kitty)$
windowrule = opacity 0.95 0.90, match:class ^(thunar)$

# ── Immediate (VirtualBox tearing fix) ─────────────────────────────
windowrule = immediate on, match:class ^(VirtualBox Machine)$

# ── Waydroid (FIXED) ───────────────────────────────────────────────
windowrule = float on, match:class ^(Waydroid)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(Waydroid)$
windowrule = size 450 800, match:class ^(Waydroid)$

# ── Idle inhibit ───────────────────────────────────────────────────
windowrule = idle_inhibit focus, match:class ^(mpv)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$
