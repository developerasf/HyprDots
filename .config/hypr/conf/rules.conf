# ╔═══════════════════════════════════════╗
# ║            conf/rules.conf            ║
# ║   Hyprland 0.48+ / 0.53+ syntax       ║
# ╚═══════════════════════════════════════╝
# Syntax: windowrule = rule, match:class ^(regex)$
#         windowrule = rule, match:title ^(regex)$
# Find class/title with: hyprctl clients

# ── Float ─────────────────────────────────────────────────────────────────────
windowrule = float, match:class ^(pavucontrol)$
windowrule = float, match:class ^(nwg-look)$
windowrule = float, match:class ^(nm-connection-editor)$
windowrule = float, match:class ^(blueman-manager)$
windowrule = float, match:class ^(org.gnome.Calculator)$
windowrule = float, match:title ^(Open File)$
windowrule = float, match:title ^(Save As)$
windowrule = float, match:title ^(Picture-in-Picture)$

# ── Float + center — polkit auth popup ────────────────────────────────────────
windowrule = float, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = center, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# ── VirtualBox ────────────────────────────────────────────────────────────────
windowrule = float, match:class ^(VirtualBox Manager)$
windowrule = size 1100 700, match:class ^(VirtualBox Manager)$
windowrule = center, match:class ^(VirtualBox Manager)$

# ── Workspace assignments ─────────────────────────────────────────────────────
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(code-oss)$
windowrule = workspace 3, match:class ^(Code)$
windowrule = workspace 4, match:class ^(thunar)$
windowrule = workspace 4, match:class ^(org.pwmt.zathura)$
windowrule = workspace 5, match:class ^(VirtualBox Machine)$
windowrule = workspace 5, match:class ^(VirtualBox Manager)$

# ── Opacity (active opacity   inactive opacity) ───────────────────────────────
windowrule = opacity 0.95 0.90, match:class ^(kitty)$
windowrule = opacity 0.95 0.90, match:class ^(thunar)$

# ── Immediate rendering — fix tearing in VirtualBox VM ───────────────────────
windowrule = immediate, match:class ^(VirtualBox Machine)$

# ── Idle inhibit — don't lock screen during media/fullscreen ─────────────────
windowrule = idleinhibit focus, match:class ^(mpv)$
windowrule = idleinhibit fullscreen, match:class ^(firefox)$
