# ╔═══════════════════════════════════════╗
# ║           conf/monitor.conf           ║
# ╚═══════════════════════════════════════╝
# Format: monitor = name, resolution@hz, position, scale
# Use `hyprctl monitors` to get your monitor name after first boot.

monitor = , 1920x1080@60, 0x0,1.1


# ── Multi-monitor examples (uncomment & edit as needed) ───────────────────────
# monitor = DP-1,   2560x1440@144, 0x0,    1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
