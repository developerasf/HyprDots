# ╔═══════════════════════════════════════╗
# ║            conf/input.conf            ║
# ╚═══════════════════════════════════════╝

input {
    kb_layout    = us
    kb_variant   =
    kb_model     =
    kb_options   =
    kb_rules     =

    follow_mouse = 1
    sensitivity  = 0        # -1.0 to 1.0, 0 = no acceleration

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        drag_lock            = false
        scroll_factor        = 0.8
    }
}
