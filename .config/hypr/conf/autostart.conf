# ╔═══════════════════════════════════════╗
# ║          conf/autostart.conf          ║
# ╚═══════════════════════════════════════╝
# exec-once = runs once on login
# exec      = runs on every hyprland reload
# ── D-Bus / Environment ──────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# This line ensures the Keyring and Polkit can talk to your session
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Keyring / Auth Agent ────────────────────────────────────────────
exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ── Wallpaper daemon ──────────────────────────────────────────────────────────
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper.sh

# ── Status bar & Notifications ────────────────────────────────────────────────
exec-once = waybar
exec-once = dunst

# ── Idle / lock daemon ────────────────────────────────────────────────────────
exec-once = hypridle

# ── Clipboard manager ─────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Other Apps ────────────────────────────────────────────────────────────────
exec-once = Polychromatic-tray

# ── Sunshine (only if installed) ──────────────────────────────────────────────
#exec-once = bash -c 'command -v sunshine &>/dev/null && sunshine || true'
#exec-once = persepolis --tray
