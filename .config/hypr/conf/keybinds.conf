# ╔═══════════════════════════════════════╗
# ║           conf/keybinds.conf          ║
# ╚═══════════════════════════════════════╝
# SUPER = Windows key / Meta key

$mod    = SUPER
$term   = kitty
$files  = thunar
$menu   = rofi -show drun -show-icons
$power  = ~/.config/hypr/scripts/powermenu.sh

# ── Applications ──────────────────────────────────────────────────────────────
bind = $mod,       Return,  exec, $term
bind = $mod,       E,       exec, $files
bind = $mod,       D,       exec, $menu
bind = $mod,       B,       exec, firefox
bind = $mod,       N,       exec, $term -e nvim
bind = $mod SHIFT, E,       exec, $power

# ── Clipboard history (rofi picker) ───────────────────────────────────────────
bind = $mod,       V,       exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── Screenshot ────────────────────────────────────────────────────────────────
bind = ,           Print,   exec, ~/.config/hypr/scripts/screenshot.sh area
bind = SHIFT,      Print,   exec, ~/.config/hypr/scripts/screenshot.sh screen
bind = $mod,       Print,   exec, ~/.config/hypr/scripts/screenshot.sh active

# ── Window management ─────────────────────────────────────────────────────────
bind = $mod,       Q,       killactive
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1   # maximize (no fullscreen state sent to app)
bind = $mod,       T,       togglefloating
bind = $mod,       P,       pseudo          # dwindle pseudotile
bind = $mod,       J,       togglesplit

# ── Focus movement (vim keys + arrows) ────────────────────────────────────────
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ── Window movement ───────────────────────────────────────────────────────────
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize windows ────────────────────────────────────────────────────────────
binde = $mod ALT, H,     resizeactive, -40 0
binde = $mod ALT, L,     resizeactive,  40 0
binde = $mod ALT, K,     resizeactive,  0 -40
binde = $mod ALT, J,     resizeactive,  0  40
binde = $mod ALT, left,  resizeactive, -40 0
binde = $mod ALT, right, resizeactive,  40 0
binde = $mod ALT, up,    resizeactive,  0 -40
binde = $mod ALT, down,  resizeactive,  0  40

# ── Workspaces 1–9 ────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move focused window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, Tab,        workspace, e+1
bind = $mod SHIFT, Tab,  workspace, e-1

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / brightness keys ───────────────────────────────────────────────────
binde = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume.sh up
binde = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume.sh down
bind  = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume.sh mute
bind  = , XF86AudioPlay,         exec, playerctl play-pause
bind  = , XF86AudioNext,         exec, playerctl next
bind  = , XF86AudioPrev,         exec, playerctl prev
binde = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness.sh up
binde = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# ── Reload / kill ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exit
