# ╔═══════════════════════════════════════╗
# ║        Tokyo Night — Color Palette    ║
# ║   Single source of truth for Hyprland ║
# ╚═══════════════════════════════════════╝
# All other configs reference these variables where possible.
# To switch themes, only this file needs to change.

# Background layers
$bg       = 0xff1a1b26   # main background
$bg1      = 0xff16161e   # darker bg (titlebars, inactive)
$bg2      = 0xff24283b   # surface / popups
$bg3      = 0xff2f3549   # selection highlight

# Foreground
$fg       = 0xffc0caf5   # main text
$fg_dim   = 0xff565f89   # dimmed / comments

# Accent colors
$blue     = 0xff7aa2f7   # primary accent (borders, focus)
$cyan     = 0xff7dcfff
$green    = 0xff9ece6a
$yellow   = 0xffe0af68
$orange   = 0xffff9e64
$red      = 0xfff7768e
$magenta  = 0xffbb9af7
$pink     = 0xffff007c

# Border colors
$border_active   = $blue
$border_inactive = $bg3
