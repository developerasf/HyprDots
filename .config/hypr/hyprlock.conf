# ╔═══════════════════════════════════════╗
# ║            hyprlock.conf              ║
# ╚═══════════════════════════════════════╝

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
}

background {
    # Supports jpg and png — name your wallpaper file "wallpaper.jpg" or "wallpaper.png"
    # To use any image: change this path to match your filename
    path        = ~/.config/hypr/wallpapers/wallpaper.jpg
    blur_size   = 7
    blur_passes = 4
    brightness  = 0.6
}

# ── Clock ──────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(c0caf5ff)
    font_size   = 80
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(565f89ff)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, -10
    halign      = center
    valign      = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor           =
    size              = 280, 52
    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.2
    dots_center       = true
    outer_color       = rgba(7aa2f7ff)
    inner_color       = rgba(1a1b26dd)
    font_color        = rgba(c0caf5ff)
    fade_on_empty     = true
    placeholder_text  = <span foreground="##565f89">  Enter Password</span>
    position          = 0, -180
    halign            = center
    valign            = center
}
