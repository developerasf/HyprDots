#? Config file for btop v. 1.3.x

# ── Color theme ───────────────────────────────────────────────────────────────
color_theme = "tokyo-night"
theme_background = True

# ── Layout ────────────────────────────────────────────────────────────────────
# Presets: 0=full, 1=minimal, 2=proc only
shown_boxes = "cpu mem net proc"
update_ms = 1500

# ── CPU ───────────────────────────────────────────────────────────────────────
cpu_graph_upper = "total"
cpu_graph_lower = "user"
cpu_invert_lower = True
cpu_single_graph = False
cpu_bottom = False
show_uptime = True
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
temp_scale = "celsius"
base_10_sizes = False
show_cpu_freq = True
clock_format = "%X"
background_update = True

# ── Memory ────────────────────────────────────────────────────────────────────
mem_graphs = True
mem_below_net = False
zfs_arc_cached = True

# ── Processes ─────────────────────────────────────────────────────────────────
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True
proc_cpu_graphs = True
proc_info_smaps = False
proc_left = False
proc_filter_kernel = False
proc_aggregate = False

# ── Network ───────────────────────────────────────────────────────────────────
net_download = 100
net_upload = 100
net_auto = True
net_sync = False
net_iface = "Auto"
show_battery = True
selected_battery = "Auto"
show_battery_watts = True

# ── Misc ──────────────────────────────────────────────────────────────────────
log_level = "WARNING"
disks_filter = ""
use_fstab = True
only_physical = True
zfs_hide_datasets = False
show_disks = True
show_io_stat = True
io_mode = False
io_graph_combined = False
io_rx_tx = False
disk_free_priv = False
swap_disk = True
vim_keys = True
rounded_corners = True
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"
